services:
  coordinator:
    build: ./coordinator
    ports:
      - "127.0.0.1:8420:8420"
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - C3PO_SERVER_SECRET=${C3PO_SERVER_SECRET}
      - C3PO_ADMIN_KEY=${C3PO_ADMIN_KEY}
      - C3PO_PROXY_BEARER_TOKEN=${C3PO_PROXY_BEARER_TOKEN}
      - C3PO_BEHIND_PROXY=true
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped
    stop_grace_period: 15s
    read_only: true
    tmpfs:
      - /tmp:size=10M
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 128M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8420/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  auth-proxy:
    image: ghcr.io/sigbit/mcp-auth-proxy:latest
    command: >-
      --external-url https://mcp.qerk.be
      --github-client-id ${GITHUB_CLIENT_ID}
      --github-client-secret ${GITHUB_CLIENT_SECRET}
      --github-allowed-users ${GITHUB_ALLOWED_USER}
      --proxy-bearer-token ${C3PO_PROXY_BEARER_TOKEN}
      --listen :8421
      --no-auto-tls
      --trusted-proxies 172.16.0.0/12
      --http-streaming-only
      -- http://coordinator:8420
    ports:
      - "127.0.0.1:8421:8421"
    volumes:
      - auth_proxy_data:/data
    depends_on:
      - coordinator
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 64M

  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    environment:
      - C3PO_SERVER_SECRET=${C3PO_SERVER_SECRET}
      - NGINX_ENVSUBST_FILTER=C3PO_SERVER_SECRET
    depends_on:
      coordinator:
        condition: service_healthy
      auth-proxy:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 64M

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: >-
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=10M
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  redis_data:
  auth_proxy_data:
